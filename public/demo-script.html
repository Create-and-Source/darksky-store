<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Demo Script</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: #F0EDE6; overflow: hidden; height: 100vh; touch-action: pan-y; }

  .app { height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    padding: 12px 20px; background: #1A1A2E; border-bottom: 1px solid rgba(212,175,55,0.2);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .topbar-title { font: 700 14px 'Inter'; color: #D4AF37; }
  .topbar-step { font: 500 12px 'JetBrains Mono'; color: #64748B; }

  .progress { height: 3px; background: #1A1A2E; flex-shrink: 0; }
  .progress-bar { height: 100%; background: #D4AF37; transition: width 0.3s; }

  .card-container { flex: 1; overflow: hidden; position: relative; }
  .card {
    position: absolute; inset: 0; padding: 32px 24px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
    transition: opacity 0.3s, transform 0.3s;
  }
  .card.hidden { opacity: 0; transform: translateX(40px); pointer-events: none; }
  .card.hidden-left { opacity: 0; transform: translateX(-40px); pointer-events: none; }

  .section-badge {
    display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
    font: 600 11px 'JetBrains Mono'; letter-spacing: 2px; text-transform: uppercase;
    color: #D4AF37; background: rgba(212,175,55,0.1); padding: 6px 14px; border-radius: 100px;
  }

  .say {
    font: 400 22px/1.5 'Inter'; color: #F0EDE6;
  }

  .click-box {
    background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px; padding: 14px 18px;
  }
  .click-label { font: 600 10px 'JetBrains Mono'; letter-spacing: 1.5px; text-transform: uppercase; color: #D4AF37; margin-bottom: 6px; }
  .click-text { font: 600 16px 'Inter'; color: #D4AF37; }

  .nav-buttons {
    padding: 16px 20px; background: #1A1A2E; border-top: 1px solid rgba(212,175,55,0.2);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    gap: 12px;
  }
  .nav-btn {
    font: 600 15px 'Inter'; border: none; border-radius: 10px; padding: 14px 28px;
    cursor: pointer; transition: all 0.2s; min-height: 48px;
  }
  .nav-prev { background: rgba(255,255,255,0.06); color: #94A3B8; flex: 0 0 auto; }
  .nav-prev:active { background: rgba(255,255,255,0.12); }
  .nav-prev:disabled { opacity: 0.3; }
  .nav-next { background: #D4AF37; color: #1A1A2E; flex: 1; max-width: 200px; }
  .nav-next:active { background: #E5C76B; }
  .nav-next:disabled { opacity: 0.3; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const STEPS = [
  { section: "Start", say: "This is MuseumOS. It runs the entire Dark Sky Discovery Center from one place. Every person on the team logs in and sees exactly what they need — nothing more, nothing less.", click: "You're on the Sign In page. Point to the admin roles on the left and portals on the right." },
  { section: "Start", say: "I'm going to sign in as Dr. J — the Executive Director. He sees everything.", click: "Click the Executive Director card." },

  { section: "Dashboard", say: "This is what Dr. J sees every morning. How much money came in, how many members we have, what events are coming up, how fundraising is going. All of it, right here, no digging.", click: "Slowly point to revenue, members, events sections on the dashboard." },
  { section: "Dashboard", say: "See this bar at the top? That's the announcement banner on the website. If we type something here, it shows up on the public site right now. The two sides talk to each other.", click: "Point to the announcement section." },

  { section: "Messages", say: "This replaces email for the team. Maria sent a message about a field trip. Josi is asking about reordering posters. No more lost emails, no more 'did you see my text.' It's all here.", click: "Click Messages in the sidebar." },
  { section: "Messages", say: "And it's not just staff — teachers can message us directly from the School Portal. I'll show you that in a minute.", click: "Click on a conversation. Type a quick reply to show it works." },

  { section: "Gift Shop", say: "This is the cash register. When someone walks up to buy something, you search for the product or scan the barcode, and it goes right into the cart.", click: "Click POS in the sidebar. Type 'star map' in the search box." },
  { section: "Gift Shop", say: "If they're a member, you scan the QR code on their phone and their discount kicks in automatically — no looking up names in a spreadsheet. Then you hit Charge and it goes through Square.", click: "Scroll down to the member section on the right side." },

  { section: "Orders", say: "Every sale — whether it happened at the register or on the website — shows up here. You can see who bought what, when, and how much they paid.", click: "Click Orders in the sidebar." },

  { section: "Inventory", say: "This is everything in the gift shop and the warehouse. Yellow means we're running low. Red means we're out. You can see exactly how fast something is selling and how many days until it runs out.", click: "Click Inventory in the sidebar. Point to the color-coded status badges." },

  { section: "Products", say: "Here's every product we sell — the stuff that ships from Printify and the stuff we keep in the gift shop. The physical products have barcodes that we print on sticker sheets and put on the items.", click: "Click Products in the sidebar." },

  { section: "Reordering", say: "When something is running low, you create a purchase order right here. Pick the vendor, pick the products, say how many you need. It tracks the whole thing — ordered, shipped, received.", click: "Click Purchase Orders in the sidebar." },

  { section: "Receiving", say: "When a box shows up at the door, this is where you log what's inside. You pick the location, scan or search for each item, type how many came in, and the inventory updates right away.", click: "Click Receive in the sidebar." },

  { section: "Transfers", say: "This moves products between the warehouse and the gift shop. You create a transfer, mark it shipped, and when Josi gets it at the shop, she marks it received. Both locations stay accurate.", click: "Click Transfers in the sidebar." },

  { section: "Events", say: "This is where you create events — star parties, planetarium shows, workshops, anything. You set the date, time, how many people can come, the price, and whether members get in free.", click: "Click Events in the sidebar." },
  { section: "Events", say: "When someone goes to our website and reserves a spot, it shows up here automatically. You can see exactly how many tickets are left for each event.", click: "Point to the ticket numbers on the event list." },

  { section: "Field Trips", say: "This is huge for Dr. J. Every school field trip is tracked from the first phone call to the thank you note. You can see which schools are coming, when, how many students, and where they are in the process.", click: "Click Field Trips in the sidebar." },
  { section: "Field Trips", say: "Click View on any trip and you get the full picture — the teacher's name, phone number, what grade, what they want to do. And the school can check all of this on their own through the School Portal.", click: "Click View on one of the field trips." },

  { section: "Contacts", say: "This is every person who has ever interacted with the center — members, people who bought something, people who donated, volunteers, school contacts. It pulls them in automatically. No one has to type anything.", click: "Click Contacts in the sidebar under CRM." },

  { section: "Donations", say: "Every donation is tracked here. When someone donates on the website, it shows up instantly. The fundraising total on the board meeting screen updates by itself.", click: "Click Donations in the sidebar." },

  { section: "Email", say: "You can send email blasts right from here. Pick who gets it — all members, people who came to an event, donors. There are templates so you don't start from scratch every time.", click: "Click Email in the sidebar." },

  { section: "Texts", say: "Same thing but for text messages. Clear skies tonight? Hit the Clear Sky Alert template, pick 'All Members,' and send. They all get a text in seconds.", click: "Click Text Blasts in the sidebar. Select the Clear Sky Alert template." },

  { section: "Social", say: "This is where you manage social media. Write a post, pick which platforms — Instagram, Facebook, X, LinkedIn — and schedule it. All from one place instead of logging into four different apps.", click: "Click Social Media in the sidebar." },

  { section: "Design", say: "Need a flyer or a social media graphic? Type what you want — like 'poster for tonight's star party' — and it creates one for you using AI. Save it and post it.", click: "Click Design Studio in the sidebar." },

  { section: "Volunteers", say: "This manages all the volunteers. You can see who's on the roster, what days they're available, how many hours they've worked, and which certifications they have — like first aid or telescope training.", click: "Click Volunteers in the sidebar. Click through the tabs — Roster, Schedule, Hours, Training." },

  { section: "Staff", say: "This is for paid staff. You see everyone who works here, their hours for the week, and you can export it all to send to your payroll company. We track the time — they handle the taxes.", click: "Click Staff & Time in the sidebar." },

  { section: "Reports", say: "This shows you how the business is doing. How much money came in, what's selling, what's in stock, how many members you have. And here's the thing — each person only sees the reports that matter to them.", click: "Click Reports in the sidebar." },

  { section: "QuickBooks", say: "This is Nancy's favorite page. She clicks one button and it downloads everything she needs for QuickBooks — sales, products, customers, bills. No more typing receipts by hand.", click: "Click QuickBooks in the sidebar." },

  { section: "Roles", say: "Now here's what makes this special. Watch what happens when I switch to a different person. I'm going to become Josi, the gift shop manager.", click: "Click the name in the top right corner. Switch to Gift Shop Manager." },
  { section: "Roles", say: "See how the whole thing changed? Josi only sees the gift shop stuff — the register, orders, inventory. She doesn't see financial reports or QuickBooks because that's not her job. Now let me switch to Nancy.", click: "Switch to Treasurer in the dropdown." },
  { section: "Roles", say: "Nancy sees donations, reports, and QuickBooks. No gift shop, no events. Now Maria, the Education Director.", click: "Switch to Education Director." },
  { section: "Roles", say: "Maria sees field trips, events, and volunteers. Everything she needs to run programs. Nobody is overwhelmed with stuff they don't use.", click: "Point to her dashboard showing field trip stats." },

  { section: "Board", say: "For board meetings, there's a presentation view. You put this on the projector and it shows the fundraising progress, revenue, membership numbers, and upcoming events. Big and clean.", click: "Switch to Board Member in the dropdown. Click Open Board Meeting View." },

  { section: "Portals", say: "It's not just for the staff. Members, volunteers, and schools each get their own portal where they can do things themselves without calling us.", click: "Go to the Sign In page. Point to the Portals section on the right." },
  { section: "Portals", say: "This is what a member sees. Their membership card with a QR code that Josi scans at the register. They can reserve event tickets and donate — all without leaving this page.", click: "Click Member Portal." },
  { section: "Portals", say: "This is what a school sees. They pick their school name, and they can check their field trip status, see a checklist of what to bring, and send a message to Maria.", click: "Go back to Sign In. Click School Portal. Select a school from the dropdown." },
  { section: "Portals", say: "And this is the volunteer portal. They can clock in — and it checks their GPS to make sure they're actually at the building. They can log their hours and see their training progress.", click: "Go back to Sign In. Click Volunteer Portal." },

  { section: "Website", say: "And then there's the public website that visitors see. Everything on this site is connected to the admin system. The events you create show up here. The products in the shop are the same products in inventory.", click: "Switch to the storefront browser window. Scroll slowly through the homepage." },
  { section: "Website", say: "People can shop online, reserve event tickets, sign up for membership, book field trips, donate, and contact us — and every single one of those things shows up in the admin automatically.", click: "Click through to the Shop page, then the Events page." },

  { section: "Close", say: "That's MuseumOS. One login for every person. One system for every department. No spreadsheets, no email chains, no paper forms. The only things left to connect are Square for payments and the QuickBooks sync — everything else you just saw is built and working today.", click: null },
  { section: "Close", say: "This is how the Dark Sky Discovery Center should run from day one.", click: null },
];

let current = 0;

function render() {
  const step = STEPS[current];
  const total = STEPS.length;
  const progress = ((current + 1) / total) * 100;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="topbar-title">Demo Script</div>
      <div class="topbar-step">${current + 1} / ${total}</div>
    </div>
    <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
    <div class="card-container">
      <div class="card">
        <div class="section-badge">${step.section}</div>
        <div class="say">${step.say}</div>
        ${step.click ? `
          <div class="click-box">
            <div class="click-label">Do This</div>
            <div class="click-text">${step.click}</div>
          </div>
        ` : ''}
      </div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn nav-prev" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>Back</button>
      <button class="nav-btn nav-next" onclick="go(1)" ${current === total - 1 ? 'disabled' : ''}>Next &rarr;</button>
    </div>
  `;
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= STEPS.length) return;
  current = next;
  render();
}

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) go(diff > 0 ? 1 : -1);
});

render();
</script>
</body>
</html>
